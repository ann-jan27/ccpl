<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ccpl信息收集系统</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 15px; line-height: 1.6; }
  .page { max-width: 700px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }
  .hd { margin-bottom: 2rem; }
  .hd h1 { font-size: 24px; font-weight: 600; margin-bottom: 6px; }
  .hd p { font-size: 14px; color: #666; }
  .sec { background: #fff; border: 1px solid #e8e8e6; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }
  .sec-tag { display: inline-block; font-size: 12px; font-weight: 600; letter-spacing: .04em; color: #185fa5; background: #e6f1fb; padding: 3px 10px; border-radius: 20px; margin-bottom: 1.25rem; }
  .f { margin-bottom: 1.1rem; }
  .f:last-child { margin-bottom: 0; }
  .f label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 5px; }
  .req { color: #e24b4a; }
  .hint { font-weight: 400; color: #999; margin-left: 5px; font-size: 12px; }
  .f input, .f select, .f textarea {
    width: 100%; font-family: inherit; font-size: 14px; color: #1a1a1a;
    background: #fafafa; border: 1px solid #ddd; border-radius: 8px;
    padding: 9px 12px; outline: none; transition: border-color .15s;
  }
  .f input:focus, .f select:focus, .f textarea:focus { border-color: #378add; background: #fff; }
  .f textarea { resize: vertical; min-height: 80px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 520px) { .row2 { grid-template-columns: 1fr; } }
  .upload-area {
    border: 1.5px dashed #ccc; border-radius: 8px; padding: 1.5rem;
    text-align: center; cursor: pointer; background: #fafafa; transition: border-color .15s;
  }
  .upload-area:hover { border-color: #378add; }
  .upload-area.has-file { border-style: solid; border-color: #1d9e75; background: #f0fbf6; }
  .upload-area p { font-size: 14px; color: #555; margin-bottom: 3px; }
  .upload-area span { font-size: 12px; color: #999; }
  .paper-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
  .paper-row textarea { flex: 1; min-height: 58px; }
  .rm-btn {
    flex-shrink: 0; width: 30px; height: 30px; border: 1px solid #ddd;
    border-radius: 8px; background: #fff; cursor: pointer; color: #999;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
    transition: all .15s; line-height: 1;
  }
  .rm-btn:hover { background: #fff0f0; color: #e24b4a; border-color: #f09595; }
  .add-btn {
    font-size: 13px; color: #185fa5; background: #e6f1fb;
    border: 1px solid #b5d4f4; border-radius: 8px;
    padding: 5px 14px; cursor: pointer; margin-top: 6px; transition: opacity .15s;
  }
  .add-btn:hover { opacity: .8; }
  .apa-eg { font-size: 11px; color: #aaa; font-family: monospace; margin-top: 5px; line-height: 1.5; }
  .submit-row { margin-top: 1.75rem; display: flex; align-items: center; gap: 14px; }
  .submit-btn {
    background: #1a1a1a; color: #fff; border: none; border-radius: 8px;
    padding: 11px 32px; font-size: 15px; font-weight: 500; cursor: pointer;
    font-family: inherit; transition: opacity .15s;
  }
  .submit-btn:disabled { opacity: .4; cursor: not-allowed; }
  .submit-btn:not(:disabled):hover { opacity: .82; }
  .msg { font-size: 13px; }
  .msg.ok { color: #0f6e56; }
  .msg.err { color: #e24b4a; }
  .success-box {
    display: none; text-align: center; background: #fff;
    border: 1px solid #e8e8e6; border-radius: 12px; padding: 3rem 2rem;
  }
  .success-box h2 { font-size: 20px; font-weight: 600; color: #0f6e56; margin-bottom: 10px; }
  .success-box p { font-size: 14px; color: #666; }
  .admin-link { margin-top: 2rem; text-align: center; font-size: 13px; color: #999; }
  .admin-link a { color: #185fa5; text-decoration: none; }
  .admin-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="page">
  <div class="hd">
    <h1>ccpl信息收集系统</h1>
    <p>请如实填写，用于课题组官网展示。标注 <span class="req">*</span> 为必填项。</p>
  </div>

  <div id="form-body">
    <div class="sec">
      <div class="sec-tag">01 · 基本信息</div>
      <div class="row2">
        <div class="f"><label>姓名 <span class="req">*</span></label><input id="name" type="text" placeholder="请输入真实姓名" /></div>
        <div class="f"><label>邮箱 <span class="req">*</span></label><input id="email" type="email" placeholder="请输入常用邮箱" /></div>
      </div>
      <div class="row2">
        <div class="f">
          <label>入学年份 <span class="req">*</span></label>
          <select id="year">
            <option value="">请选择</option>
          </select>
        </div>
        <div class="f">
          <label>学位类型 <span class="req">*</span></label>
          <select id="degree">
            <option value="">请选择</option>
            <option>硕士研究生</option><option>博士研究生</option><option>博士后</option>
          </select>
        </div>
      </div>
      <div class="f">
        <label>证件照 <span class="req">*</span><span class="hint">2寸白底或蓝底，JPG/PNG，图片清晰即可，不超过5MB</span></label>
        <div class="upload-area" id="upload-area" onclick="document.getElementById('photo').click()">
          <p id="photo-name">点击上传证件照</p>
          <span id="photo-size">支持 JPG、PNG 格式，不超过 5MB</span>
        </div>
        <input type="file" id="photo" accept="image/jpeg,image/png" style="display:none" onchange="handlePhoto(this)" />
      </div>
    </div>

    <div class="sec">
      <div class="sec-tag">02 · 学术背景</div>
      <div class="row2">
        <div class="f"><label>本科院校 <span class="req">*</span></label><input id="school" type="text" placeholder="如：北京大学" /></div>
        <div class="f"><label>本科专业 <span class="req">*</span></label><input id="major" type="text" placeholder="如：计算机科学与技术" /></div>
      </div>
      <div class="row2">
        <div class="f"><label>硕士院校<span class="hint">选填，如有请填写</span></label><input id="master-school" type="text" placeholder="如：中国科学院大学" /></div>
        <div class="f"><label>硕士专业<span class="hint">选填，如有请填写</span></label><input id="master-major" type="text" placeholder="如：计算机应用技术" /></div>
      </div>
      <div class="f">
        <label>硕士/博士研究方向 <span class="req">*</span><span class="hint">1-2句话简要描述</span></label>
        <textarea id="research" placeholder="如：主要研究社交媒体用户行为分析与心理健康计算，关注大数据背景下的情感识别与预测方法。"></textarea>
      </div>
    </div>

    <div class="sec">
      <div class="sec-tag">03 · 学术成果</div>
      <div class="f">
        <label>已发表 / 录用论文<span class="hint">APA格式，每条一篇，无则留空</span></label>
        <div id="papers">
          <div class="paper-row">
            <textarea placeholder="Author, A., & Author, B. (Year). Title. Journal, vol(issue), pages."></textarea>
            <button class="rm-btn" onclick="removePaper(this)">×</button>
          </div>
        </div>
        <div class="apa-eg">示例：Zhang, W., & Li, H. (2023). Article title. Journal Name, 12(3), 45–67.</div>
        <button class="add-btn" onclick="addPaper()">+ 添加一篇论文</button>
      </div>
    </div>

    <div class="sec">
      <div class="sec-tag">04 · 获奖情况</div>
      <div class="f">
        <label>奖项 / 荣誉<span class="hint">选填，每行一条</span></label>
        <textarea id="awards" placeholder="如：2023年国家奖学金&#10;2022年ACM竞赛一等奖" style="min-height:90px"></textarea>
      </div>
    </div>

    <div class="sec">
      <div class="sec-tag">05 · 在线系统</div>
      <div class="f">
        <label>演示系统链接<span class="hint">选填，如有多个请换行填写</span></label>
        <textarea id="links" placeholder="https://..." style="min-height:60px"></textarea>
      </div>
      <div class="f">
        <label>系统简要说明<span class="hint">选填</span></label>
        <input id="link-desc" type="text" placeholder="如：抑郁风险预测平台，支持文本输入分析" />
      </div>
    </div>

    <div class="submit-row">
      <button class="submit-btn" id="submit-btn" onclick="submitForm()">提交信息</button>
      <span class="msg" id="msg"></span>
    </div>
  </div>

  <div class="success-box" id="success-box">
    <h2>提交成功</h2>
    <p>你的信息已记录，如需修改请联系网站负责人。</p>
  </div>

  <div class="admin-link"><a href="admin.html">管理员入口 →</a></div>
</div>

<script>
let photoData = null;

// 动态生成年份
(function() {
  const yearSelect = document.getElementById('year');
  const currentYear = new Date().getFullYear();
  for (let y = currentYear + 2; y >= 2015; y--) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    yearSelect.appendChild(opt);
  }
})();

function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    document.getElementById('msg').textContent = '图片超过5MB，请压缩后重新上传';
    document.getElementById('msg').className = 'msg err';
    input.value = ''; return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    photoData = e.target.result;
    document.getElementById('photo-name').textContent = file.name;
    document.getElementById('photo-size').textContent = (file.size / 1024).toFixed(0) + ' KB · 上传成功';
    document.getElementById('upload-area').classList.add('has-file');
  };
  reader.readAsDataURL(file);
}

function addPaper() {
  const list = document.getElementById('papers');
  const d = document.createElement('div');
  d.className = 'paper-row';
  d.innerHTML = '<textarea placeholder="Author, A., & Author, B. (Year). Title. Journal, vol(issue), pages."></textarea><button class="rm-btn" onclick="removePaper(this)">×</button>';
  list.appendChild(d);
  d.querySelector('textarea').focus();
}

function removePaper(btn) {
  const list = document.getElementById('papers');
  if (list.children.length > 1) btn.parentElement.remove();
}

function getPapers() {
  return Array.from(document.querySelectorAll('#papers textarea')).map(t => t.value.trim()).filter(Boolean);
}

async function submitForm() {
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('msg');
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const year = document.getElementById('year').value;
  const degree = document.getElementById('degree').value;
  const school = document.getElementById('school').value.trim();
  const major = document.getElementById('major').value.trim();
  const research = document.getElementById('research').value.trim();

  if (!name || !email || !year || !degree || !school || !major || !research) {
    msg.textContent = '请填写所有必填项'; msg.className = 'msg err'; return;
  }
  if (!photoData) {
    msg.textContent = '请上传证件照'; msg.className = 'msg err'; return;
  }

  btn.disabled = true;
  msg.textContent = '提交中...'; msg.className = 'msg';

  const record = {
    submittedAt: new Date().toLocaleString('zh-CN'),
    name, email, year, degree,
    school, major, research,
    masterSchool: document.getElementById('master-school').value.trim(),
    masterMajor: document.getElementById('master-major').value.trim(),
    photo: photoData,
    papers: getPapers(),
    awards: document.getElementById('awards').value.trim(),
    links: document.getElementById('links').value.trim(),
    linkDesc: document.getElementById('link-desc').value.trim()
  };

  try {
    const resp = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(record)
    });
    
    if (resp.ok) {
      document.getElementById('form-body').style.display = 'none';
      document.getElementById('success-box').style.display = 'block';
    } else {
      throw new Error('Server error');
    }
  } catch(e) {
    msg.textContent = '提交失败，请重试'; msg.className = 'msg err';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
