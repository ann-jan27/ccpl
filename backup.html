<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据备份与恢复</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
  .section { background: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
  button { background: #1a1a1a; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; }
  button:hover { opacity: 0.8; }
  .info { color: #666; font-size: 14px; margin-top: 10px; }
  textarea { width: 100%; min-height: 200px; font-family: monospace; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
</style>
</head>
<body>
<h1>LocalStorage 数据管理</h1>

<div class="section">
  <h2>备份数据</h2>
  <button onclick="backupData()">导出 LocalStorage 数据</button>
  <p class="info">将当前浏览器中的所有提交数据导出为 JSON 文件</p>
</div>

<div class="section">
  <h2>恢复数据</h2>
  <input type="file" id="restoreFile" accept=".json" onchange="restoreData(this)">
  <p class="info">从备份文件恢复数据到当前浏览器</p>
</div>

<div class="section">
  <h2>查看原始数据</h2>
  <button onclick="viewData()">查看 JSON 数据</button>
  <button onclick="clearDisplay()">清空显示</button>
  <textarea id="dataDisplay" readonly></textarea>
  <p class="info">查看 localStorage 中存储的原始 JSON 数据</p>
</div>

<script>
function backupData() {
  const data = localStorage.getItem('lab-submissions');
  if (!data) {
    alert('暂无数据可备份');
    return;
  }

  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'lab-submissions-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  alert('数据已导出');
}

function restoreData(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (confirm('确认恢复数据？这将覆盖当前所有数据。')) {
        localStorage.setItem('lab-submissions', JSON.stringify(data));
        alert('数据恢复成功！');
        location.reload();
      }
    } catch (err) {
      alert('文件格式错误：' + err.message);
    }
  };
  reader.readAsText(file);
}

function viewData() {
  const data = localStorage.getItem('lab-submissions');
  if (!data) {
    document.getElementById('dataDisplay').value = '暂无数据';
    return;
  }

  try {
    const parsed = JSON.parse(data);
    document.getElementById('dataDisplay').value = JSON.stringify(parsed, null, 2);
  } catch (err) {
    document.getElementById('dataDisplay').value = '数据格式错误：' + err.message;
  }
}

function clearDisplay() {
  document.getElementById('dataDisplay').value = '';
}
</script>
</body>
</html>
